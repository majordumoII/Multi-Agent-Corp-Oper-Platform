services:
  api-gateway:
    build:
      context: .
      dockerfile: docker/api_gateway.Dockerfile
    ports:
      - "8080:8080"
    environment:
      - LOCAL_DEV=true
      - ORCHESTRATOR_URL=http://orchestrator:8081
      - GATEWAY_PORT=8080
    depends_on:
      - orchestrator

  orchestrator:
    build:
      context: .
      dockerfile: docker/orchestrator.Dockerfile
    ports:
      - "8081:8081"
    environment:
      - LOCAL_DEV=true
      # Point at a locally running Project 2 instance (outside this
      # compose file — see Enterprise-RAG-Security-Guardrails/README.md).
      - RAG_SERVICE_URL=http://host.docker.internal:8000
      - ORCHESTRATOR_PORT=8081
